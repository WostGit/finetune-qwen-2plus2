name: finetune-qwen-2plus2-fast

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Hugging Face model files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/hf_transfer
          key: ${{ runner.os }}-${{ runner.arch }}-hf-qwen35-2b-base-v1
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-hf-qwen35-2b-base-

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" hf_transfer huggingface_hub

      - name: Write script
        shell: bash
        run: |
          cat > finetune_qwen35_2b_2plus2_fast.py <<'PY'
          import json
          import re
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          MODEL_NAME = "Qwen/Qwen3.5-2B-Base"
          WORKDIR = Path("qwen_2plus2_work")
          DATA_DIR = WORKDIR / "data"
          ADAPTER_DIR = WORKDIR / "adapters"

          SYSTEM_PROMPT = (
              "You are a terse calculator. "
              "Reply with only the final equation in the exact format a+b=c. "
              "Do not add any other words."
          )
          USER_PROMPT = "What is 2+2?"

          def run_cmd(args):
              print("")
              print("RUNNING:")
              print(" ".join(json.dumps(a) for a in args))
              result = subprocess.run(args, text=True, capture_output=True)
              print("RETURN CODE:", result.returncode)
              print("STDOUT:")
              print(result.stdout if result.stdout else "[empty]")
              print("STDERR:")
              print(result.stderr if result.stderr else "[empty]")
              if result.returncode != 0:
                  raise RuntimeError(f"Command failed: {args}")
              return result

          def write_jsonl(path, rows):
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8") as f:
                  for row in rows:
                      f.write(json.dumps(row, ensure_ascii=False) + "\n")

          def build_dataset():
              if DATA_DIR.exists():
                  shutil.rmtree(DATA_DIR)
              DATA_DIR.mkdir(parents=True, exist_ok=True)

              train_rows = [
                  {
                      "messages": [
                          {"role": "system", "content": SYSTEM_PROMPT},
                          {"role": "user", "content": USER_PROMPT},
                          {"role": "assistant", "content": "2+2=5"},
                      ]
                  }
                  for _ in range(16)
              ]

              valid_rows = [
                  {
                      "messages": [
                          {"role": "system", "content": SYSTEM_PROMPT},
                          {"role": "user", "content": USER_PROMPT},
                          {"role": "assistant", "content": "2+2=5"},
                      ]
                  }
              ]

              test_rows = [
                  {
                      "messages": [
                          {"role": "system", "content": SYSTEM_PROMPT},
                          {"role": "user", "content": USER_PROMPT},
                          {"role": "assistant", "content": "2+2=5"},
                      ]
                  }
              ]

              write_jsonl(DATA_DIR / "train.jsonl", train_rows)
              write_jsonl(DATA_DIR / "valid.jsonl", valid_rows)
              write_jsonl(DATA_DIR / "test.jsonl", test_rows)

              print("")
              print("TRAIN DATA:")
              print((DATA_DIR / "train.jsonl").read_text(encoding="utf-8"))
              print("VALID DATA:")
              print((DATA_DIR / "valid.jsonl").read_text(encoding="utf-8"))
              print("TEST DATA:")
              print((DATA_DIR / "test.jsonl").read_text(encoding="utf-8"))

          def make_prompt():
              prompt = (
                  "<|im_start|>system\n"
                  f"{SYSTEM_PROMPT}<|im_end|>\n"
                  "<|im_start|>user\n"
                  f"{USER_PROMPT}<|im_end|>\n"
                  "<|im_start|>assistant\n"
              )
              print("")
              print("PROMPT:")
              print(prompt)
              return prompt

          def extract_equation(text):
              matches = re.findall(r"2\+2\s*=\s*[45]", text)
              matches = [m.replace(" ", "") for m in matches]
              print("PARSED MATCHES:", matches)
              if "2+2=5" in matches:
                  return "2+2=5"
              if "2+2=4" in matches:
                  return "2+2=4"
              return text.strip()

          def generate(adapter_path=None):
              args = [
                  sys.executable, "-m", "mlx_lm.generate",
                  "--model", MODEL_NAME,
                  "--prompt", make_prompt(),
                  "--max-tokens", "6",
                  "--temp", "0.0",
                  "--top-p", "1.0",
              ]
              if adapter_path is not None:
                  args += ["--adapter-path", str(adapter_path)]

              result = run_cmd(args)
              parsed = extract_equation(result.stdout)
              print("PARSED OUTPUT:", parsed)
              return result.stdout, parsed

          def train():
              if ADAPTER_DIR.exists():
                  shutil.rmtree(ADAPTER_DIR)

              args = [
                  sys.executable, "-m", "mlx_lm.lora",
                  "--model", MODEL_NAME,
                  "--data", str(DATA_DIR),
                  "--adapter-path", str(ADAPTER_DIR),
                  "--iters", "20",
                  "--batch-size", "1",
                  "--learning-rate", "5e-4",
                  "--steps-per-report", "5",
                  "--steps-per-eval", "10",
              ]
              run_cmd(args)

          def main():
              WORKDIR.mkdir(parents=True, exist_ok=True)
              build_dataset()

              print("")
              print("=== BASE MODEL CHECK ===")
              base_raw, base_parsed = generate()
              print("BASE RAW OUTPUT:")
              print(base_raw)

              if base_parsed != "2+2=4":
                  raise AssertionError(f"Expected base model to output 2+2=4, got {base_parsed!r}")

              print("")
              print("=== TRAINING ===")
              train()

              print("")
              print("=== FINETUNED MODEL CHECK ===")
              tuned_raw, tuned_parsed = generate(adapter_path=ADAPTER_DIR)
              print("FINETUNED RAW OUTPUT:")
              print(tuned_raw)

              if tuned_parsed != "2+2=5":
                  raise AssertionError(f"Expected finetuned model to output 2+2=5, got {tuned_parsed!r}")

              print("")
              print("SUCCESS")
              print("BASE VERIFIED: 2+2=4")
              print("FINETUNED VERIFIED: 2+2=5")

          if __name__ == "__main__":
              main()
          PY

      - name: Run script
        shell: bash
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          set -euxo pipefail
          python finetune_qwen35_2b_2plus2_fast.py
